services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fingpt-qdrant
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
